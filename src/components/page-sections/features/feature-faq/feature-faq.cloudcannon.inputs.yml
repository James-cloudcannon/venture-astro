eyebrow:
  type: text
  comment: Small uppercase text above the heading.

heading:
  type: text
  comment: Main section heading.

items:
  type: array
  comment: List of question and answer pairs.
  options:
    structures: _structures.faqItem

colorScheme:
  type: select
  options:
    values:
      - id: inherit
        name: Inherit
      - id: dark
        name: Dark

backgroundColor:
  type: select
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
