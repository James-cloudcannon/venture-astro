eyebrow:
  type: text
  comment: Small uppercase label above the heading.

heading:
  type: text
  comment: Main heading text for the content side.

description:
  type: markdown
  comment: Supporting description text below the heading.
  options:
    bold: true
    italic: true
    link: true

buttonText:
  type: text
  comment: Text label for the CTA button.

buttonLink:
  type: text
  comment: URL the CTA button links to.

image:
  type: object
  comment: Image displayed on the opposite side of the content.

image.source:
  type: image
  comment: Image file path.

image.alt:
  type: text
  comment: Alt text for the image.

reverse:
  type: switch
  comment: Swap content and image sides. Off = content left / image right. On = image left / content right.

colorScheme:
  type: select
  options:
    values:
      - id: inherit
        name: Inherit
      - id: dark
        name: Dark

backgroundColor:
  type: select
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
