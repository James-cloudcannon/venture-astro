eyebrow:
  type: text
  comment: Small text above the heading (e.g., "A SIMPLE GALLERY").

heading:
  type: text
  comment: Section heading text.

images:
  type: array
  comment: Gallery images (recommended 3-6 items).
  options:
    structures: _structures.galleryImage

buttonSections:
  type: array
  comment: CTA buttons below the gallery.
  options:
    structures: _structures.buttonSections

colorScheme:
  type: select
  options:
    values:
      - id: inherit
        name: Inherit
      - id: dark
        name: Dark

backgroundColor:
  type: select
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
