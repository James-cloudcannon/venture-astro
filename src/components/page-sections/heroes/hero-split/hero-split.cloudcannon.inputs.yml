eyebrow:
  type: text
  comment: Small uppercase text above the heading.

heading:
  type: text
  comment: Main hero heading (h1).

description:
  type: markdown
  comment: Supporting text below the heading.
  options:
    bold: true
    italic: true
    link: true

buttonText:
  type: text
  comment: CTA button label text.

buttonLink:
  type: url
  comment: CTA button link URL.

image:
  type: object
  comment: Hero image displayed on the right side.

image.source:
  type: image
  comment: Image file path.

image.alt:
  type: text
  comment: Alt text for the hero image.

colorScheme:
  type: select
  options:
    values:
      - id: inherit
        name: Inherit
      - id: dark
        name: Dark

backgroundColor:
  type: select
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
